{% extends "_base.html" %}

{% block title %}{{ book.title }} - جزئیات{% endblock %}

{% block content %}
    <h1>{{ book.title|capfirst }}</h1>
    <p><b>نویسنده:</b> {{ book.author }}</p>
    <p><b>توضیحات:</b> {{ book.description }}</p>
    <p><b>قیمت:</b> {{ book.price }} تومان</p>
    
    <div>
        <a href="{% url 'book_list' %}"><button>بازگشت</button></a>
        <a href="{% url 'book_update' book.id %}"><button>ویرایش</button></a>
    </div>
{% endblock %}
